<div class="form-container">
  
  <div class="dashboard-header">
    <div class="kpi-card bg-azul">
      <span class="kpi-icone">🎟️</span>
      <div class="kpi-info">
        <span class="kpi-titulo">Ingressos Vendidos</span>
        <span class="kpi-valor">{{ calcularIngressosVendidos() }}</span>
      </div>
    </div>

    <div class="kpi-card bg-verde">
      <span class="kpi-icone">💰</span>
      <div class="kpi-info">
        <span class="kpi-titulo">Faturamento Total</span>
        <span class="kpi-valor">R$ {{ calcularTotalArrecadado() | number:'1.2-2' }}</span>
      </div>
    </div>
  </div>

  <h2>Histórico de Vendas</h2>
  
  <table class="tabela-estilizada">
    <thead>
      <tr>
        <th>ID</th>
        <th>Cliente ID</th>
        <th>Evento ID</th>
        <th>Data</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of listaPedidos">
        <td>{{ p.id }}</td>
        <td>{{ p.clienteId }}</td>
        <td>{{ p.eventoId }}</td>
        <td>{{ p.data }}</td>
        <td>R$ {{ p.total }}</td>
      </tr>
    </tbody>
  </table>
</div>
